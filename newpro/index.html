<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="description" content="코딩은 모험이다! 뉴프로 커뮤니티에서 아이디어를 나누고, 즐거운 코드 토크를 펼쳐보세요!" />
  <meta name="keywords" content="코딩, 커뮤니티, 프로그래밍, 개발자, 뉴프로" />
  <meta name="author" content="뉴프로" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#2a4065">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#0b1220">
  <meta property="og:title" content="뉴프로 커뮤니티" />
  <meta property="og:description" content="코딩은 모험이다! 뉴프로 커뮤니티에서 아이디어를 나누고, 즐거운 코드 토크를 펼쳐보세요!" />
  <title>뉴프로 커뮤니티</title>

  <link rel="icon" href="../favicon.ico" sizes="any">

  <link rel="manifest" href="manifest.json">
  <!-- Google Font (Jua) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Comic+Neue:wght@400;700&family=Poor+Story&display=swap" rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />

  <!-- Toast UI Editor: CSS/JS, 코드블록 하이라이트 플러그인 -->
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/theme/toastui-editor-dark.min.css" />
  <link rel="stylesheet" href="https://uicdn.toast.com/editor-plugin-code-syntax-highlight/latest/toastui-editor-plugin-code-syntax-highlight.min.css" />
  <link rel="stylesheet" href="./common/common.css" />
  <style>
    .comment-item {
      background-color: #f8f9fa;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      margin-bottom: 0.5rem;
      color: #000;
    }
    [data-bs-theme="dark"] .comment-item {
      background-color: rgba(255, 255, 255, 0.08);
      color: #e9ecef;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    
    .post-subtitle {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    #postList img {
      max-width: 100%;
      height: auto;
    }
    .toastui-editor-contents img {
      max-width: 90%;         /* 화면 가로의 90%까지만 차지 */
      max-height: 80vh;       /* 화면 세로의 80%까지만 표시 */
      object-fit: contain;     /* 비율 그대로 예쁘게 */
      display: block;          /* 가운데 정렬을 위해 block */
      margin: 1rem 0;       /* 위아래 여백 + 가로 중앙 */
      border-radius: 0.5rem;   /* 둥글둥글 귀엽게 */
    }
    .keep-line-breaks {
      white-space: pre-line;
    }
    .notice-banner {
      font-family: 'Jua';
      background: linear-gradient(130deg, #002f2f, #004a3f);
      border: 1px solid #0a7f5f;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
      color: #69ffa2;
      /* font-weight: bold; */
      /* text-shadow: 0 0 1px #69ffa2; */
      transition: filter 0.3s;
    }
    .notice-banner:hover {
      filter: brightness(1.2);
    }
    .notice-banner p {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .gift-event-banner {
      display: block;
      font-family: 'Jua';
      background: linear-gradient(135deg, #fff7db, #ffe59a 58%, #ffd166);
      border: 1px solid #f6c453;
      border-radius: 0.6rem;
      padding: 0.62rem 0.85rem;
      margin-bottom: 0.75rem;
      color: #7a4a00;
      box-shadow: 0 4px 12px rgba(246, 196, 83, 0.25);
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
      text-decoration: none;
    }
    .gift-event-banner p {
      margin: 0;
      line-height: 1.25;
    }
    .gift-banner-title {
      margin: 0 0 0.35rem 0;
      line-height: 1.2;
      font-weight: 700;
      color: inherit;
    }
    .gift-chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .gift-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.12rem 0.52rem;
      font-size: 0.82rem;
      font-weight: 700;
      background: rgba(122, 74, 0, 0.16);
      border: 1px solid rgba(122, 74, 0, 0.34);
      color: #663c00;
    }
    .gift-event-banner:hover {
      transform: translateY(-1px);
    }
    [data-bs-theme="dark"] .gift-event-banner {
      background: linear-gradient(135deg, #5a3a07, #7a4b0e 58%, #8d5a11);
      border-color: rgba(251, 191, 36, 0.5);
      color: #fde68a;
      box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
    }
    [data-bs-theme="dark"] .gift-chip {
      background: rgba(251, 191, 36, 0.18);
      border-color: rgba(251, 191, 36, 0.48);
      color: #fef3c7;
    }
    .video-responsive {
      position: relative;
      width: 560px;
      max-width: 100%;
      margin: 1rem 0;
    }
    .video-responsive::before {
      content: "";
      display: block;
      padding-top: 56.25%;
    }
    .video-responsive iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      border: 0;
    }
    .magic-btn {
      position: relative;
      overflow: hidden;
      color: #000;
      border-radius: 5px;
      margin-left: 5px;
      padding: 2px 6px;
      transition: box-shadow 0.3s;
    }
    .magic-btn:hover {
      box-shadow: 0 0 8px 2px rgba(255, 215, 0, 0.8);
    }
    .magic-btn:disabled {
      border: none !important;
      box-shadow: none !important;
    }
    .magic-shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0.1) 100%);
      background-size: 200% auto;
      animation: shimmer 1.5s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }
    .magic-blessing {
      background: linear-gradient(45deg, rgba(255,215,0,0.4), rgba(255,215,0,0.8));
      animation: blessingPulse 2s ease-in-out infinite;
    }
    @keyframes blessingPulse {
      0%, 100% { box-shadow: 0 0 10px 2px rgba(255,215,0,0.8); }
      50% { box-shadow: 0 0 20px 4px rgba(255,215,0,1); }
    }
    .magic-curse {
      filter: invert(1) blur(2px);
    }
    .magic-font {
      font-family: 'Comic Neue', cursive, sans-serif !important;
      color: #d9534f;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .magic-title {
      direction: rtl;
      unicode-bidi: bidi-override;
    }
    .magic-rainbow {
      background: linear-gradient(45deg,
        rgba(255, 0, 0, 0.4),
        rgba(255, 165, 0, 0.4),
        rgba(255, 255, 0, 0.4),
        rgba(0, 128, 0, 0.4),
        rgba(0, 0, 255, 0.4),
        rgba(75, 0, 130, 0.4),
        rgba(238, 130, 238, 0.4)
      );
      animation: rainbowPulse 2s ease-in-out infinite;
    }
    @keyframes rainbowPulse {
      0%, 100% {
        box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.8);
      }
      50% {
        box-shadow: 0 0 20px 4px rgba(238, 130, 238, 1);
      }
    }
    .magic-ultimate {
      background: radial-gradient(circle, rgba(255,215,0,0.4), rgba(255,215,0,0.2), rgba(0,0,0,0));
      animation: ultimateGlow 30s infinite, pulseGlow 2s infinite, borderGlow 2s infinite;
      border: 3px solid #ff595e;
      box-shadow: 0 0 10px 5px #ff595e;
    }

    @keyframes ultimateGlow {
      0%   { transform: perspective(1200px) scale(1.0) rotateY(-10deg); }
      25%   { transform: perspective(1200px) scale(0.9) rotateY(360deg); }
      50%  { transform: perspective(1200px) scale(1.0) rotateY(10deg); }
      50%  { transform: perspective(1200px) scale(0.9) rotateY(10deg); }
      100% { transform: perspective(1200px) scale(1.0) rotateY(-10deg); }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 10px 5px rgba(255,215,0,0.7); }
      50% { box-shadow: 0 0 20px 10px rgba(255,215,0,1); }
    }

    @keyframes borderGlow {
      0% { border-color: #ff595e; box-shadow: 0 0 10px 5px #ff595e; }
      25% { border-color: #ffca3a; box-shadow: 0 0 10px 5px #ffca3a; }
      50% { border-color: #8ac926; box-shadow: 0 0 10px 5px #8ac926; }
      75% { border-color: #1982c4; box-shadow: 0 0 10px 5px #1982c4; }
      100% { border-color: #ff595e; box-shadow: 0 0 10px 5px #ff595e; }
    }

    .magic-basic {
      animation: basicGlow 2s infinite;
    }
    @keyframes basicGlow {
      0% { box-shadow: 0 0 5px rgba(0, 255, 255, 0.5); }
      50% { box-shadow: 0 0 15px rgba(0, 255, 255, 1); }
      100% { box-shadow: 0 0 5px rgba(0, 255, 255, 0.5); }
    }
    @media (max-width: 576px) {
      .action-buttons {
        margin-left: auto;
        text-align: right;
        display: flex;
        gap: 0.1rem;
      }

      /* Toast UI Editor 의 팝업 클래스 명은 버전에 따라 toastui-editor-popup, țu-image-popup 등일 수 있어요.
     실제 클래스명을 확인해서 앞부분을 바꿔서 써 주시면 됩니다! */
      .toastui-editor-popup {
        position: fixed !important;       /* 뷰포트 기준으로 */
        top: 50% !important;              /* 세로 중앙 */
        left: 95% !important;             /* 가로 중앙 */
        transform: translate(-50%, -50%) !important;
        max-width: 90vw !important;       /* 화면 너비의 90% */
        max-height: 90vh !important;      /* 화면 높이의 90% */
        overflow: auto !important;        /* 내용용 스크롤 허용 */
        z-index: 1050 !important;         /* 다른 요소 위에 뜨도록 */
      }
    }

    /* 좋아요(추천) 버튼 타오르는 애니메이션 */
    @keyframes likeFlame {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.4); /* 파란색 (Bootstrap primary 색상 계열) */
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 10px 6px rgba(0, 123, 255, 0.4);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.4);
      }
    }
    .like-flame {
      animation: likeFlame 0.5s ease-in-out;
    }

    @keyframes burningAnimation {
      0% {
        filter: brightness(1) drop-shadow(0 0 5px rgba(255, 69, 0, 0.8));
      }
      50% {
        filter: brightness(1) drop-shadow(0 0 15px rgba(255, 69, 0, 1));
      }
      100% {
        filter: brightness(1) drop-shadow(0 0 5px rgba(255, 69, 0, 0.8));
      }
    }
    .burning {
      animation: burningAnimation 1.5s infinite;
    }

    .toastui-editor-contents {
      font-size: 16px;
    }

    .toastui-editor-contents p {
      margin: 0;             /* 문단 사이 여백도 넉넉하게 */
    }

    [data-bs-theme="dark"] .toastui-editor-contents code {
      background: rgba(255,255,255,0.08);
      color: #f8fafc;                 /* 인라인 코드 */
    }
    [data-bs-theme="dark"] .toastui-editor-contents pre {
      background-color: #0f172a;      /* 코드블록 배경 */
      color: #e5e7eb;                 /* 코드블록 글자 */
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* 🩹 리스트 가독성 패치: 다크에서 <ul><li> 글자/마커 색 밝게 */
    [data-bs-theme="dark"] .toastui-editor-contents ul,
    [data-bs-theme="dark"] .toastui-editor-contents ol,
    [data-bs-theme="dark"] .toastui-editor-contents li {
      color: #e9ecef !important;
    }
    [data-bs-theme="dark"] .toastui-editor-contents ul > li::marker,
    [data-bs-theme="dark"] .toastui-editor-contents ol > li::marker {
      color: #cbd5e1 !important; /* 불릿/숫자도 보이게 */
    }

    /* 표/인용문 등 이어지는 기존 다크 스타일 */
    [data-bs-theme="dark"] .toastui-editor-contents blockquote {
      background: rgba(255,255,255,0.05);
      border-left: 4px solid rgba(255,255,255,0.2);
      color: #e9ecef;
    }

  /* 퀴즈 카드 전용 스타일 */
  .quiz-card {
    border: 2px solid #4CAF50;
    color: #333;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    margin-top: 1rem;
    padding: 1rem 0.5rem;
    font-family: 'Poor Story';
  }
  .quiz-card .card-title {
    color: #4CAF50;
    font-size: 1.1rem; /* 폰트 크기를 키움 */
    font-weight: 700;
  }
  .quiz-question {
    font-size: 1.1rem; /* 폰트 크기를 키움 */
    font-weight: bold;
  }
  .quiz-option, .quiz-result {
    margin: 0.3rem;
    font-size: 1.0rem;
    font-weight: bold;
  }  
  .quiz-result .btn {
    margin: 0.1rem;
    font-size: 0.9rem;
    font-weight: bold;
  }

  [data-bs-theme="dark"] .quiz-card {
    background: rgba(2, 6, 23, 0.66);         /* 더 어두운 바탕 (#020617 계열) */
    border-color: rgba(76, 175, 80, 0.55);    /* 그린 테두리 살짝 낮춤 */
    color: #e5e7eb;                           /* 본문 글자 밝게 */
    box-shadow: 0 2px 6px rgba(0,0,0,0.35);   /* 그림자도 다크에 맞춰 */
  }
  [data-bs-theme="dark"] .quiz-card .card-title {
    color: #86efac;                           /* 연한 그린으로 가독성 ↑ */
  }
  [data-bs-theme="dark"] .quiz-question {
    color: #f1f5f9;                           /* 문제 텍스트 또렷하게 */
  }
  [data-bs-theme="dark"] .quiz-result {
    color: #c7d2fe;                           /* 결과 문구 살짝 포인트(연한 인디고) */
  }
  /* 선택지 버튼 외곽선 대비 강화(부트스트랩 outline-primary 유지) */
  [data-bs-theme="dark"] .quiz-card .btn-outline-primary {
    border-color: #86b7fe;
    color: #cfe3ff;
  }
  [data-bs-theme="dark"] .quiz-card .btn-outline-primary:hover {
    background: rgba(134,183,254,.12);
  }
  [data-bs-theme="dark"] .bg-info {
    background-color: #0ea5e9 !important; /* Tailwind sky-500 느낌 */
    color: #e0f2fe !important;           /* 연한 하늘색 글자 */
  }

  @media (max-width: 767.98px) { /* Bootstrap의 md 기준 */
    .mobile-sm-btn {
      font-size: 0.875rem; /* sm 크기 */
      padding: 0.25rem 0.5rem;
    }
  }
  
  .auto-height {
    field-sizing: content
  }

  /* 🆕 댓글 새로고침 아이콘 회전 */
  .refresh-rotating {
    display: inline-block;
    animation: refresh-spin 0.9s linear infinite;
    transform-origin: 50% 50%;
  }
  @keyframes refresh-spin {
    to { transform: rotate(360deg); }
  }
  </style>
</head>
<body>  
  <!-- 네비게이션 바 -->
  <div id="menu-container"></div>

  <!-- Hero Section -->
  <section class="hero-section">
    <h1 class="hero-title">코딩은 모험이다!</h1>
    <p class="hero-subtitle">뉴프로 커뮤니티에서 아이디어를 마음껏 나누고, 즐거운 코드 토크를 펼쳐보세요!</p>
  </section>

  <!-- 메인 컨테이너 -->
  <div class="container mb-5">
    <!-- 기존 버튼들 옆에 검색 필터 버튼 추가 -->
    <div class="d-flex justify-content-end mb-2">
      <button class="btn btn-outline-info me-2 mobile-sm-btn" id="filterBtn" data-bs-toggle="modal" data-bs-target="#filterModal">🔎 검색</button>
      <button class="btn btn-outline-info me-2 mobile-sm-btn" id="showRankingBtn" data-bs-toggle="modal" data-bs-target="#rankingModal">🎭 랭킹</button>
      <button class="btn shining-btn me-2 mobile-sm-btn" id="showRankBtn" data-bs-toggle="modal" data-bs-target="#rankModal">👤 내 등급</button>
      <button class="btn btn-light mobile-sm-btn" id="togglePostFormBtn">✍️ 글쓰기</button>
    </div>

    <div id="noticeContainer" class="notice-container mb-3"></div>

    <!-- 글쓰기 카드 (숨김) -->
    <div class="card glass-card p-0 p-md-3 d-none" id="postCard">
      <div class="card-body">
        <h5 class="card-title">새 글 작성</h5>
        <div class="mb-3">
          <label for="postTitle" class="form-label">제목</label>
          <input type="text" class="form-control" id="postTitle" placeholder="제목을 입력하세요" />
        </div>
        <div class="mb-3 position-relative">
          <label for="editor" class="form-label">내용</label>
          <div id="editor"></div>
        </div>
        <div class="text-end">
          <button class="btn btn-primary mt-2" id="savePostBtn">글 저장하기</button>
        </div>
      </div>
    </div>

    <!-- 글 목록 카드 -->
    <div class="card glass-card mt-4">
      <div class="card-body px-0 px-md-3">
        <h4 class="card-title adventure text-center">모험의 기록</h4>
        <div id="postList" class="mt-3"><!-- 게시글 목록이 로드됩니다 --></div>
      </div>
    </div>
  </div>

  <!-- 검색 필터 모달 -->
  <div class="modal fade" id="filterModal" tabindex="-1" aria-labelledby="filterModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="filterModalLabel">검색 필터</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <!-- 검색 대상 선택: 제목 또는 닉네임 -->
          <div class="mb-3">
            <label class="form-label">검색 대상</label>
            <div>
              <input type="radio" id="searchByTitle" name="searchField" value="title" checked>
              <label for="searchByTitle">제목</label>
              <input type="radio" id="searchByNickname" name="searchField" value="nickname" class="ms-3">
              <label for="searchByNickname">닉네임</label>
            </div>
          </div>
          <!-- 검색어 입력 -->
          <div class="mb-3">
            <label for="filterInput" class="form-label">검색어</label>
            <input type="text" class="form-control" id="filterInput" placeholder="검색어를 입력하세요">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="clearFilterBtn">초기화</button>
          <button type="button" class="btn btn-primary" id="applyFilterBtn">검색</button>
        </div>
      </div>
    </div>
  </div>


  <!-- [수정 모달] -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editModalLabel">글 수정</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editPostId" />
          <div class="mb-3">
            <label for="editTitle" class="form-label">제목</label>
            <input type="text" class="form-control" id="editTitle" placeholder="제목을 입력하세요" />
          </div>
          <div class="mb-3 position-relative">

    let quizQuestionsAll;

    function createQuizCard() {
      const card = document.createElement('div');
      card.className = 'card glass-card mb-3 quiz-card';

      const cardBody = document.createElement('div');
      cardBody.className = 'card-body';
      card.appendChild(cardBody);

      function loadQuiz() {
        cardBody.innerHTML = '';
        var quiz = quizQuestionsAll[Math.floor(Math.random() * quizQuestionsAll.length)];
        cardBody.innerHTML = `
          <div>
            <h5 class="card-title" style="display: inline;">퀴즈 타임!</h5>
            <span class="quiz-points badge bg-info" style="margin-left: 10px;">누적 ${card.currentPoints}점</span>

          <div class="quiz-options mb-3"></div>
          <p class="quiz-result text-info" style="display: inline;"></p>
        `;
        const optionsDiv = cardBody.querySelector('.quiz-options');
        const resultEl = cardBody.querySelector('.quiz-result');

        let options = quiz.options.slice();
        options = shuffleArray(options);

        options.forEach(function(option) {
          const btn = document.createElement('button');
          btn.className = 'btn btn-outline-primary quiz-option';
          btn.textContent = option;
          btn.addEventListener('click', function() {
            // 모든 선택지 버튼 비활성화
            optionsDiv.querySelectorAll('button').forEach(b => b.disabled = true);
            if (option === quiz.answer) {
              // 정답 시, "정답입니다! 2점"처럼 표시 (현재 누적 포인트 대신 현재 문제에 추가될 포인트만 표시)
              resultEl.innerHTML = `정답입니다! 누적점수: ${card.currentPoints}점 `;
              const continueBtn = document.createElement('button');
              continueBtn.className = 'btn btn-primary btn-sm';
              continueBtn.textContent = '계속';
              continueBtn.style.marginLeft = '10px';
              const confirmBtn = document.createElement('button');
              confirmBtn.className = 'btn btn-success btn-sm';
              confirmBtn.textContent = '확정';
              confirmBtn.style.marginLeft = '5px';

              continueBtn.addEventListener('click', function() {
                card.continueClicks++;
                let newPoints = Math.pow(2, card.continueClicks);
                card.currentPoints = Math.min(newPoints, 50);
                loadQuiz();
              });

              confirmBtn.addEventListener('click', async function() {
                continueBtn.disabled = true;
                confirmBtn.disabled = true;
                const awarded = await awardQuizPoints(card.currentPoints);
                let message;
                if(awarded == null) {
                  message = '로그인이 필요합니다.'; 
                } else { 
                  message = `확정하였습니다!`;
                  if(awarded !== 0) {
                    message += ` ${awarded}점 획득!`;
                  }
                }
                resultEl.innerHTML = message;
              });

              if(card.currentPoints < 50) {
                resultEl.appendChild(continueBtn);
              }
              resultEl.appendChild(confirmBtn);
            } else {
              resultEl.innerHTML = `오답입니다. 정답은: ${quiz.answer}`;
              card.continueClicks = 0;
              card.currentPoints = 1;
            }
          });
          optionsDiv.appendChild(btn);
        });
      }

      loadQuiz();
      return card;
    }

    async function awardQuizPoints(points) {

        } else {
          showToast(`퀴즈 포인트 ${awarded}점 획득!`, "퀴즈 챌린지");
        }
        return awarded;
      } catch (err) {
        showToast(err.message, "오류");
      }

      return null;
    }

    function shuffleArray(array) {
      for (var i = array.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = array[i];
        array[i] = array[j];
        array[j] = temp;
      }
      return array;
    }

    /********************************

    function formatDateTime(timestamp) {
      if (!timestamp || !timestamp.seconds) return '';
      const date = new Date(timestamp.seconds * 1000);
      let year = date.getFullYear(), month = date.getMonth() + 1, day = date.getDate();
      let hours = date.getHours(), minutes = date.getMinutes(), seconds = date.getSeconds();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12; hours = hours === 0 ? 12 : hours;
      minutes = minutes.toString().padStart(2, '0'); seconds = seconds.toString().padStart(2, '0');
      return `${year}.${month}.${day}, ${hours}:${minutes}:${seconds} ${ampm}`;
    }

    function decodeHtml(html) {

    function parseTimeParameter(timeStr) {
      let seconds = 0;
      const hMatch = timeStr.match(/(\d+)h/);
      if (hMatch) seconds += parseInt(hMatch[1], 10) * 3600;
      const mMatch = timeStr.match(/(\d+)m/);
      if (mMatch) seconds += parseInt(mMatch[1], 10) * 60;
      const sMatch = timeStr.match(/(\d+)s/);
      if (sMatch) seconds += parseInt(sMatch[1], 10);
      if (!hMatch && !mMatch && !sMatch && /^\d+$/.test(timeStr)) seconds = parseInt(timeStr, 10);
      return seconds;
    }
    function convertYouTubeLinks(text) {
      if (
        /(&lt;iframe|<iframe)/i.test(text) ||
        /(&lt;a|<a).*?(youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|live\/))/i.test(text)
      ) {
        return text;
      }

      return text.replace(
        /(?:https?:\/\/)?(?:www\.)?(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|live\/))([A-Za-z0-9_-]{11})([^<\s]*)/g,
        (match, videoId, params) => {
          let startParam = '';
          if (params) {
            const queryString = params.replace(/&amp;/g, '&').replace(/^[\?&]/, '');
            const searchParams = new URLSearchParams(queryString);
            const t = searchParams.get('t');
            if (t) {
              const seconds = parseTimeParameter(t);
              startParam = `?start=${seconds}`;
            }
          }
          return `<div class="video-responsive">
                    <iframe width="560" height="315" 
                            src="https://www.youtube.com/embed/${videoId}${startParam}" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                    </iframe>
                  </div>`;
        }
      );
    }
    
    function convertLinks(text) {
      return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
    }

    /********************************

    const ACTIVE_EVENT_PREVIEW_LIMIT = 3;

    async function fetchActiveGiftSummary() {
      const q = query(
        collection(db, 'card_events'),
        where('winnerUid', '==', null),
        limit(ACTIVE_EVENT_PREVIEW_LIMIT + 1)
      );
      const snap = await getDocs(q);
      if (snap.empty) {
        return { giftNames: [], hasMore: false };
      }

      const allGiftNames = [];
      for (const eventDoc of snap.docs) {
        const eventData = eventDoc.data();
        if (eventData?.giftName) {
          allGiftNames.push(eventData.giftName);
        }
      }

      const hasMore = allGiftNames.length > ACTIVE_EVENT_PREVIEW_LIMIT;
      const shuffledGiftNames = shuffleArray([...allGiftNames]);
      const giftNames = shuffledGiftNames.slice(0, ACTIVE_EVENT_PREVIEW_LIMIT);
      return { giftNames, hasMore };

          <div class="gift-chip-wrap">${chipsHtml}</div>
        `;
        noticeContainer.appendChild(giftBannerEl);
      }

      for (const docSnap of snapshot.docs) {

        bannerEl.textContent = data.content;

    /********************************
     * 댓글 렌더링 (계층구조 처리)
     ********************************/
     async function renderComments(postId, comments, containerEl) {
      containerEl.innerHTML = '';
      const header = document.getElementById(`commentHeader-${postId}`);
      // 댓글 항상 표시로 바꿈.
      // if (comments.length === 0) {
      //   if (header) header.style.display = 'none';
      // } else {
      //   if (header) header.style.display = '';
      // }
      const commentMap = {};
      comments.forEach(c => {
        c.children = [];
        commentMap[c.commentId] = c;
      });
      const roots = [];
      comments.forEach(c => {
        if (c.parentCommentId && commentMap[c.parentCommentId]) {
          commentMap[c.parentCommentId].children.push(c);
        } else {
          roots.push(c);
        }
      });

      function isOnlyEmoji(text) {
        const trimmed = text.trim();
        const regex = /^(?:\p{Extended_Pictographic}(?:\uFE0F|\p{Emoji_Modifier})?(?:\u200D\p{Extended_Pictographic}(?:\uFE0F|\p{Emoji_Modifier})?)*)$/u;
        return regex.test(trimmed);
      }

      function renderCommentNode(comment, indent = 0) {
        let rankIcon = '';
        let commentNickname = comment.nickname || '익명';        
        const div = document.createElement('div');
        div.id = 'commentNode-' + comment.commentId;   // ★ 이 부분 추가!
        div.className = 'comment-item';
        // indent는 rem 단위로 적용되며, 최대 2rem까지만 들여쓰기합니다.
        div.style.marginLeft = indent + 'rem';

        const safeContent = DOMPurify.sanitize(comment.content ?? '', { ALLOWED_TAGS: [] });
        let finalContent;
        if (isOnlyEmoji(safeContent)) {
          finalContent = `<span class="emoji-large">${safeContent}</span>`;
        } else {
          finalContent = convertLinks(safeContent);
        }
        const dateStr = formatDateTime(comment.createdAt);

        const currentUser = auth.currentUser;
        const canDelete = currentUser && (currentUser.uid === comment.uid || admin);
        // 최상위 댓글(indent가 0인 경우)에만 답글 버튼과 폼을 노출
        const replyButtonHtml = (indent === 0) 
          ? `<button class="btn btn-sm btn-link" id="replyBtn-${postId}-${comment.commentId}">답글</button>`
          : '';
        const replyFormHtml = (indent === 0)  
          ? `<div class="reply-form d-none" id="replyForm-${postId}-${comment.commentId}">
              <textarea class="form-control mb-2 auto-height" rows="2" placeholder="댓글을 입력하세요" id="replyInput-${postId}-${comment.commentId}"></textarea>
              <div class="d-flex justify-content-md-start justify-content-end">
                <button class="btn btn-secondary btn-sm" id="replySubmitBtn-${postId}-${comment.commentId}">댓글 달기</button>
              </div>
            </div>`
          : '';

        div.innerHTML = `
          <div class="fw-bold">
            ${commentNickname} <span style="cursor:pointer;" id="commentRankIcon-${postId}-${comment.commentId}">${rankIcon}</span>
          </div>
          <div class="small text-muted mb-1">
            ${dateStr}
          </div>
          <div class="keep-line-breaks">${finalContent}</div>
          <div class="mt-1 d-flex align-items-center gap-2">
            <button class="btn btn-sm btn-outline-primary" id="commentLikeBtn-${postId}-${comment.commentId}">👍</button>
            <span id="commentLikeCount-${postId}-${comment.commentId}">${comment.likes ? comment.likes.length : 0}</span>
            <button class="btn btn-sm btn-outline-danger" id="commentDislikeBtn-${postId}-${comment.commentId}">👎</button>
            <span id="commentDislikeCount-${postId}-${comment.commentId}">${comment.dislikes ? comment.dislikes.length : 0}</span>            
            ${canDelete ? `<button id="delBtn-${postId}-${comment.commentId}" class="btn btn-sm btn-danger ms-2">삭제</button>` : ''}
            ${replyButtonHtml}
          </div>
          ${replyFormHtml}
        `;

        // --- 추가된 부분: 현재 사용자가 이미 좋아요/싫어요 한 경우 버튼 활성화 처리 --- 
        if (auth.currentUser) {
          const userId = auth.currentUser.uid;
          const commentLikeBtn = div.querySelector(`#commentLikeBtn-${postId}-${comment.commentId}`);
          const commentDislikeBtn = div.querySelector(`#commentDislikeBtn-${postId}-${comment.commentId}`);
          if (comment.likes && comment.likes.includes(userId)) {
            commentLikeBtn.classList.remove('btn-outline-primary');
            commentLikeBtn.classList.add('btn-primary');
          }
          if (comment.dislikes && comment.dislikes.includes(userId)) {
            commentDislikeBtn.classList.remove('btn-outline-danger');
            commentDislikeBtn.classList.add('btn-danger');
          }
        }
        // ---------------------------------------------------------------------------

        // 삭제 버튼 이벤트
        const delBtn = div.querySelector(`#delBtn-${postId}-${comment.commentId}`);
        if (delBtn) {
          delBtn.addEventListener('click', () => {
            openDeleteCommentModal(postId, comment.commentId);
          });
        }

        // 좋아요 / 싫어요 버튼 이벤트
        const commentLikeBtn = div.querySelector(`#commentLikeBtn-${postId}-${comment.commentId}`);
        const commentDislikeBtn = div.querySelector(`#commentDislikeBtn-${postId}-${comment.commentId}`);
        commentLikeBtn.addEventListener('click', () => {
          toggleCommentLike(postId, comment.commentId);          
        });
        commentDislikeBtn.addEventListener('click', () => toggleCommentDislike(postId, comment.commentId));

        // 답글 버튼과 폼은 indent가 0인 경우(최상위 댓글)일 때만 이벤트를 등록합니다.
        if (indent === 0) {
          const replyBtn = div.querySelector(`#replyBtn-${postId}-${comment.commentId}`);
          const replyForm = div.querySelector(`#replyForm-${postId}-${comment.commentId}`);
          replyBtn.addEventListener('click', () => {
            if(!currentUser) {
              requireLogin();
              return;
            }
            replyForm.classList.toggle('d-none');
            if (!replyForm.classList.contains('d-none')) {
              const replyInput = div.querySelector(`#replyInput-${postId}-${comment.commentId}`);
              replyInput.focus();
            }
          });
          const replySubmitBtn = div.querySelector(`#replySubmitBtn-${postId}-${comment.commentId}`);
          replySubmitBtn.addEventListener('click', () => {
            const replyInput = div.querySelector(`#replyInput-${postId}-${comment.commentId}`);
            const text = replyInput.value.trim();
            if (text) {
              addComment(postId, text, comment.commentId);
              replyInput.value = '';
              replyForm.classList.add('d-none');
            }
          });
        }

        // 계급 아이콘 설정
        const rankIconEl = div.querySelector(`#commentRankIcon-${postId}-${comment.commentId}`);
        if (comment.uid) {
          fetchUserDoc(comment.uid).then(snap => {
            if (snap.exists()) {
              const userData = snap.data();
              const userScore = userData.score || 0;
              const rankInfo = getRankByScore(userScore);
              rankIconEl.textContent = rankInfo.icon;
              rankIconEl.addEventListener('click', () => {
                const desc = userData.description ? `${userData.description}` : '소개 정보 없음';
                showToast(desc, `${userData.nickname} - ${rankInfo.name}(${userScore}점)`, 8000);                
              });
            }
          });
        }

        // 자식 댓글 렌더링
        // indent가 0인 경우에만 2rem 들여쓰기로 증가하고, 그 이후엔 최대 들여쓰기를 유지합니다.
        if (comment.children && comment.children.length > 0) {
          // 최상위 댓글일 때는 indent 0 → 2, 답글인 경우는 계속 2rem을 유지
          const newIndent = indent === 0 ? indent + 2 : indent;
          comment.children.forEach(child => {
            const childDiv = renderCommentNode(child, newIndent);
            div.appendChild(childDiv);
          });
        }
        return div;
      }

      roots.forEach(comment => {
        const commentNode = renderCommentNode(comment, 0);
        containerEl.appendChild(commentNode);
      });
    }

    /********************************
     * 좋아요/싫어요 (게시글)
     ********************************/
    let likeDislikeInProgress = new Set();
    async function toggleLike(postId) {
      const user = auth.currentUser;
      if (!user) {
        requireLogin();
        return;
      }
      const postRef = doc(db, 'posts', postId);
      const postSnap = await getDoc(postRef);
      if (!postSnap.exists()) return;
      const data = postSnap.data();
      let likes = data.likes || [];
      let dislikes = data.dislikes || [];
      let scoreDiff = 0;
      let updateData = {};
      
      if (likes.includes(user.uid)) {
        // 이미 좋아요한 경우 → 좋아요 취소 (점수 -10)
        updateData.likes = arrayRemove(user.uid);
        scoreDiff = -10;
      } else {
        // 좋아요 추가 (+10)
        updateData.likes = arrayUnion(user.uid);
        scoreDiff = 10;
        // 싫어요가 이미 눌렸다면 제거 (점수 +5 보정)
        if (dislikes.includes(user.uid)) {
          updateData.dislikes = arrayRemove(user.uid);
          scoreDiff += 5;
        }
      }
      await updateDoc(postRef, updateData);
      fetchPost(postId);
      if (scoreDiff !== 0) {
        await awardPointsAndCheckRank({ points: scoreDiff });
      }
    }

    async function toggleDislike(postId) {
      const user = auth.currentUser;
      if (!user) {
        requireLogin();
        return;
      }
      const postRef = doc(db, "posts", postId);
      const postSnap = await getDoc(postRef);
      if (!postSnap.exists()) return;
      const data = postSnap.data();
      const likes = data.likes || [];
      const dislikes = data.dislikes || [];
      let scoreDiff = 0;
      let updateData = {};

      if (dislikes.includes(user.uid)) {
        updateData.dislikes = arrayRemove(user.uid);
        scoreDiff = 5;
      } else {
        // 싫어요 추가 시: -5점 적용
        updateData.dislikes = arrayUnion(user.uid);
        scoreDiff = -5;
        // 만약 좋아요가 눌려 있다면 먼저 좋아요를 취소 (좋아요 취소 시 -10점 적용)
        if (likes.includes(user.uid)) {
          updateData.likes = arrayRemove(user.uid);
          scoreDiff -= 10;
        }
      }
      await updateDoc(postRef, updateData);
      fetchPost(postId);
      if (scoreDiff !== 0) {
        await awardPointsAndCheckRank({ points: scoreDiff });
      }
    }

    /********************************
     * 좋아요/싫어요 (댓글)

    // 댓글 좋아요 토글 함수
    async function toggleCommentLike(postId, commentId) {
      const user = auth.currentUser;
      if (!user) {
        requireLogin();
        return;
      }
      const commentRef = doc(db, "posts", postId, "comments", commentId);
      try {
        const commentSnap = await getDoc(commentRef);
        if (!commentSnap.exists()) return;
        const data = commentSnap.data();
        const likes = data.likes || [];
        const dislikes = data.dislikes || [];
        let scoreDiff = 0;
        let updateData = {};

        if (likes.includes(user.uid)) {
          // 이미 좋아요한 경우: 좋아요 취소 → -5점
          updateData.likes = arrayRemove(user.uid);
          scoreDiff = -5;
        } else {
          // 좋아요 추가 → +5점
          updateData.likes = arrayUnion(user.uid);
          scoreDiff = 5;
          // 만약 이미 싫어요가 있다면 먼저 싫어요 취소
          if (dislikes.includes(user.uid)) {
            updateData.dislikes = arrayRemove(user.uid);
            scoreDiff += 3; // 순수 효과: +8점
          }
        }
        await updateDoc(commentRef, updateData);
        fetchComment(postId);
        if (scoreDiff !== 0) {
          await awardPointsAndCheckRank({ points: scoreDiff });
        }
      } catch (err) {
        showToast(err.message, "오류");
      }
    }

    // 댓글 싫어요 토글 함수
    async function toggleCommentDislike(postId, commentId) {
      const user = auth.currentUser;
      if (!user) {        
        requireLogin();
        return;
      }
      const commentRef = doc(db, "posts", postId, "comments", commentId);
      try {
        const commentSnap = await getDoc(commentRef);
        if (!commentSnap.exists()) return;
        const data = commentSnap.data();
        const likes = data.likes || [];
        const dislikes = data.dislikes || [];
        let scoreDiff = 0;
        let updateData = {};

        if (dislikes.includes(user.uid)) {
          // 이미 싫어요한 경우: 싫어요 취소 → +3점
          updateData.dislikes = arrayRemove(user.uid);
          scoreDiff = 3;
        } else {
          // 싫어요 추가 → -3점
          updateData.dislikes = arrayUnion(user.uid);
          scoreDiff = -3;
          // 만약 좋아요가 있다면 먼저 좋아요 취소 → 추가 -5점
          if (likes.includes(user.uid)) {
            updateData.likes = arrayRemove(user.uid);
            scoreDiff -= 5; // 순수 효과: -8점
          }
        }
        await updateDoc(commentRef, updateData);
        fetchComment(postId);
        if (scoreDiff !== 0) {
          await awardPointsAndCheckRank({ points: scoreDiff });
        }
      } catch (err) {
        showToast(err.message, "오류");
      }
    }

     async function openMagicModal(postId, postData, authorScore) {
      const magicModalEl = document.getElementById('magicModal');
      const magicModal = new bootstrap.Modal(magicModalEl);
      const magicPostIdInput = document.getElementById('magicPostId');
      const magicInfoDiv = document.getElementById('magicInfo');
      const magicModalFooter = document.getElementById('magicModalFooter');
      magicPostIdInput.value = postId;
      const postRef = doc(db, 'posts', postId);
      const postSnap = await getDoc(postRef);
      const postDocData = postSnap.data();
      let magic = postDocData.magic || null;
      if (magic && magic.expiresAt) {
        const now = new Date();
        const exp = new Date(magic.expiresAt.seconds * 1000);
        if (now >= exp) magic = null;
      }
      magicInfoDiv.innerHTML = "";
      magicModalFooter.innerHTML = "";
      if (magic) {
        magicInfoDiv.innerHTML = `
          <p>현재 적용된 마법: <strong>${magicDisplayNames[magic.magicType]}</strong></p>
          <p>시전자: <strong>${magic.casterNickname || '알 수 없음'}</strong></p>
          <p>종료 시각: <strong>${magic.expiresAt ? formatDateTime(magic.expiresAt) : '알 수 없음'}</strong></p>
        `;
        const casterSnap = await getDoc(doc(db, 'users', magic.casterUid));
        const casterData = casterSnap.exists() ? casterSnap.data() : null;
        const casterScore = casterData ? (casterData.score || 0) : 0;
        if (currentScore >= casterScore) {
          const removeBtn = document.createElement('button');
          removeBtn.className = 'btn btn-danger';
          removeBtn.textContent = '마법 해제';
          removeBtn.addEventListener('click', () => removeMagic(postId));
          magicModalFooter.appendChild(removeBtn);
        }
        const closeBtn = document.createElement('button');
        closeBtn.className = 'btn btn-secondary';
        closeBtn.textContent = '닫기';
        closeBtn.setAttribute('data-bs-dismiss', 'modal');
        magicModalFooter.appendChild(closeBtn);
      } else {
        // 누구나 마법 시전 가능하도록 조건 제거
        const rankInfo = getRankByScore(currentScore);
        const availableMagic = getAvailableMagicTypes(rankInfo.name);
        let radioHTML = `<p>이 글에 시전할 마법을 선택하세요:</p>`;
        availableMagic.forEach((magicType, index) => {
          const displayName = magicDisplayNames[magicType] || magicType;
          radioHTML += `
            <div class="form-check">
              <input class="form-check-input" type="radio" name="magicRadio" id="magicRadio-${magicType}" value="${magicType}" ${index === 0 ? 'checked' : ''}>
              <label class="form-check-label" for="magicRadio-${magicType}">${displayName}</label>
            </div>`;
        });
        magicInfoDiv.innerHTML = radioHTML;
        const castBtn = document.createElement('button');
        castBtn.className = 'btn btn-primary';
        castBtn.textContent = '마법 시전';
        castBtn.addEventListener('click', () => {
          const radios = document.getElementsByName('magicRadio');
          let selectedMagic;
          for (let radio of radios) {
            if (radio.checked) {
              selectedMagic = radio.value;
              break;
            }
          }
          castMagic(postId, postData, selectedMagic);
        });
        magicModalFooter.appendChild(castBtn);
        const closeBtn = document.createElement('button');
        closeBtn.className = 'btn btn-secondary';
        closeBtn.textContent = '닫기';
        closeBtn.setAttribute('data-bs-dismiss', 'modal');
        magicModalFooter.appendChild(closeBtn);
      }
      magicModal.show();
    }
    async function castMagic(postId, postData, magicType) {
      const user = auth.currentUser;
      if (!user) {
        showToast('로그인이 필요합니다.', '오류');
        return;
      }
      const durationMapping = {
        'magic-basic': 3000,
        'magic-shimmer': 3000,
        'magic-blessing': 4000,
        'magic-curse': 4000,
        'magic-font': 5000,
        'magic-title': 5000,
        'magic-rainbow': 6000,
        'magic-ultimate': 6000
      };
      const duration = durationMapping[magicType] || 300;
      const expiresAt = Timestamp.fromDate(new Date(Date.now() + duration * 1000));
      try {
        await runTransaction(db, async (transaction) => {
          const postRef = doc(db, 'posts', postId);
          const postSnap = await transaction.get(postRef);
          if (!postSnap.exists()) throw new Error('글을 찾을 수 없습니다.');
          transaction.update(postRef, {
            magic: {
              magicType: magicType,
              casterUid: user.uid,
              casterNickname: currentNickname,
              castTime: serverTimestamp(),
              duration: duration,
              expiresAt: expiresAt
            }
          });
        });
        showToast('마법이 시전되었습니다!', '마법');
        const cardEl = document.getElementById(`postCard-${postId}`);
        if (cardEl) cardEl.classList.add(magicType);
        bootstrap.Modal.getInstance(document.getElementById('magicModal')).hide();
      } catch (err) {
        showToast(err.message, '마법 시전 실패');
      }
    }
    async function removeMagic(postId) {
      try {
        await runTransaction(db, async (transaction) => {
          const postRef = doc(db, 'posts', postId);
          const postSnap = await transaction.get(postRef);
          if (!postSnap.exists()) throw new Error('글을 찾을 수 없습니다.');
          transaction.update(postRef, { magic: deleteField() });
        });
        showToast('마법이 해제되었습니다.', '마법');
        const cardEl = document.getElementById(`postCard-${postId}`);
        if (cardEl) cardEl.className = cardEl.className.replace(/\bmagic-\S+\b/g, '');
        bootstrap.Modal.getInstance(document.getElementById('magicModal')).hide();
      } catch (err) {
        showToast(err.message, '마법 해제 실패');
      }
    }

    let lastVisible = null;
    let isLoading = false;
    const PAGE_SIZE = 5;
    async function loadMorePosts() {
      if (isLoading) return;
      isLoading = true;
      let q = query(
        collection(db, 'posts'),
        orderBy('createdAt', 'desc'),
        limit(PAGE_SIZE)
      );
      if (lastVisible) {
        q = query(
          collection(db, 'posts'),
          orderBy('createdAt', 'desc'),
          startAfter(lastVisible),
          limit(PAGE_SIZE)
        );
      }
      const snapshot = await getDocs(q);
      if (!snapshot.empty) {
        let newLastDoc = null;
        for (let docSnap of snapshot.docs) {
          const item = await createPostItem(docSnap);

          // 퀴즈 카드 하나 삽입
          if(Math.random() < 0.25) {
            const quizCard = createQuizCard();
            postList.appendChild(quizCard);
          }

          postList.appendChild(item);
          fetchComment(docSnap.id);
          newLastDoc = docSnap;
        }
        lastVisible = newLastDoc;
      }
      isLoading = false;
    }

      if (!atBottom) {

      if (isFiltering) {
        renderFilteredPostsPage();
      } else {

    /********************************
     * 랭킹 관련 (무한 스크롤)
     ********************************/
    const RANKING_PAGE_SIZE = 10;
    let rankingPage = 1;
    let rankingCursors = [null];

    async function loadRankingPage(page) {
      const container = document.getElementById('rankingContainer');
      container.innerHTML = '';
      const prevBtn = document.getElementById('prevRankingBtn');
      const nextBtn = document.getElementById('nextRankingBtn');

      // 기본 쿼리 +1개(limit+1) 가져오기
      let q = query(
        collection(db, 'users'),
        orderBy('score', 'desc')
      );
      const cursor = rankingCursors[page];
      if (cursor) {
        q = query(q, startAfter(cursor));
      }
      q = query(q, limit(RANKING_PAGE_SIZE + 1));

      const snap = await getDocs(q);
      const docs = snap.docs;
      const hasNext = docs.length > RANKING_PAGE_SIZE;
      const docsToShow = hasNext ? docs.slice(0, RANKING_PAGE_SIZE) : docs;

      // 다음 커서 저장
      rankingCursors[page + 1] = hasNext
        ? docsToShow[docsToShow.length - 1]
        : null;

      // 랭킹 렌더링
      docsToShow.forEach((docSnap, idx) => {
        const data = docSnap.data();
        const rankNum = (page - 1) * RANKING_PAGE_SIZE + idx + 1;
        const rInfo = getRankByScore(data.score || 0);
        const desc = data.description
          ? `<p class="mb-0 text-muted small">${data.description}</p>`
          : '';
        const item = document.createElement('div');
        item.className = 'p-2 border-bottom';
        item.innerHTML = `
          <strong>${rankNum}위</strong> - ${data.nickname || '익명'} : 
          ${data.score}점 ${rInfo.icon}
          ${desc}
        `;
        container.appendChild(item);
      });

      prevBtn.disabled = page === 1;
      nextBtn.disabled = !hasNext;
      rankingPage = page;
    }


    // 모달 열릴 때 초기화
    const rankingModalEl = document.getElementById('rankingModal');
    rankingModalEl.addEventListener('show.bs.modal', () => {
      rankingPage = 1;
      rankingCursors = [null];
      document.getElementById('prevRankingBtn').disabled = true;
      loadRankingPage(1);
    });

    // 버튼 이벤트
    document.getElementById('prevRankingBtn').addEventListener('click', () => {
      if (rankingPage > 1) loadRankingPage(rankingPage - 1);
    });
    document.getElementById('nextRankingBtn').addEventListener('click', () => {
      if (rankingCursors[rankingPage + 1]) loadRankingPage(rankingPage + 1);
    });


    /********************************
     * 폭죽(Confetti) 애니메이션
     ********************************/
    function launchFireworks() {
      const duration = 2000;
      const animationEnd = Date.now() + duration;
      const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };
      const interval = setInterval(() => {
        const timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) { clearInterval(interval); return; }
        const particleCount = 50 * (timeLeft / duration);
        confetti(Object.assign({}, defaults, {
          particleCount,
          origin: { x: Math.random(), y: Math.random() - 0.2 }
        }));
      }, 250);
    }

    async function highlightPostFromQuery() {
      const urlParams = new URLSearchParams(window.location.search);
      const highlightPostId = urlParams.get('postId');
      if (!highlightPostId) return;
      const existingCard = document.getElementById('postCard-' + highlightPostId);
      if (existingCard) {
        if (postList.firstChild !== existingCard) {
          postList.insertBefore(existingCard, postList.firstChild);
        }
        existingCard.style.border = '3px solid gold';
      } else {
        const postRef = doc(db, 'posts', highlightPostId);
        const postSnap = await getDoc(postRef);
        if (postSnap.exists()) {
          const card = await createPostItem(postSnap);
          card.style.border = '3px solid gold';
          postList.insertBefore(card, postList.firstChild);
          
          fetchComment(postSnap.id);
        }
      }
      const cleanUrl = new URL(window.location);
      cleanUrl.searchParams.delete('postId');
      window.history.replaceState(null, document.title, cleanUrl.toString());
    }

    function launchFireworkSpread() {
      const duration = 500; // 효과 지속 시간 (ms)
      const animationEnd = Date.now() + duration;
      const defaults = {
        origin: { x: 0.5, y: 0.5 },
        colors: ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93'],
        startVelocity: 45,
        particleCount: 20,
        spread: 360,
        ticks: 60
      };
      (function frame() {
        const timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return;
        confetti(Object.assign({}, defaults, {
          particleCount: 20,
          startVelocity: 30 + Math.random() * 20,
          angle: Math.random() * 360
        }));
        requestAnimationFrame(frame);
      }());
    }

    // 전역 상태 변수 (검색 모드 관련)
    let isFiltering = false;
    let filteredPostsArray = [];  // 검색 결과 전체 (중복 제거 후)
    let filteredPage = 0;
    const FILTER_PAGE_SIZE = 5;

    const filterModalEl = document.getElementById('filterModal');
    filterModalEl.addEventListener('shown.bs.modal', function () {
      document.getElementById('filterInput').focus();
    });

    // Firestore posts 컬렉션 참조
    const postsRef = collection(db, 'posts');

    /**
     * 선택한 필드(field)에서 검색어(searchQuery)로 접두어 검색을 수행합니다.
     * field 값은 "title" 또는 "nickname"이어야 합니다.
     */
    async function doSearch(searchQuery, field) {
      const fieldQuery = query(
        postsRef,
        where(field, '>=', searchQuery),
        where(field, '<=', searchQuery + '\uf8ff'),
        limit(50)
      );
      const snapshot = await getDocs(fieldQuery);
      const docsArray = [];
      snapshot.forEach(docSnap => {
        docsArray.push(docSnap);
      });
      // 생성일(createdAt)을 기준으로 내림차순 정렬
      docsArray.sort((a, b) => {
        const aTime = a.data().createdAt ? a.data().createdAt.seconds : 0;
        const bTime = b.data().createdAt ? b.data().createdAt.seconds : 0;
        return bTime - aTime;
      });
      return docsArray;
    }

    /**
     * 검색어를 기준으로 선택한 필드에서 Firestore 검색을 실행한 후,
     * 결과를 filteredPostsArray에 저장하고 첫 페이지(5개)를 렌더링합니다.
     */
    async function searchPosts(searchQuery) {
      isFiltering = true;
      postList.innerHTML = ''; // 기존 게시글 제거
      filteredPage = 0;
      
      // 선택된 검색 대상을 가져옴 ("title" 또는 "nickname")
      const selectedField = document.querySelector('input[name="searchField"]:checked').value;
      
      filteredPostsArray = await doSearch(searchQuery, selectedField);
      await renderFilteredPostsPage();
    }

    /**
     * filteredPostsArray에서 현재 페이지에 해당하는 5개의 게시글을 렌더링합니다.
     */
    async function renderFilteredPostsPage() {
      const startIndex = filteredPage * FILTER_PAGE_SIZE;
      const endIndex = startIndex + FILTER_PAGE_SIZE;
      const postsToRender = filteredPostsArray.slice(startIndex, endIndex);
      for (const docSnap of postsToRender) {
        const item = await createPostItem(docSnap);
        postList.appendChild(item);
        fetchComment(docSnap.id);
      }
      filteredPage++;
    }

    // 검색 필터 모달 내 "검색" 버튼 클릭 시 처리
    document.getElementById('applyFilterBtn').addEventListener('click', async () => {
      const searchQuery = document.getElementById('filterInput').value.trim();
      if (searchQuery === '') {
        showToast('검색어를 입력하세요.', '검색');
        return;
      }
      await searchPosts(searchQuery);
      bootstrap.Modal.getInstance(document.getElementById('filterModal')).hide();
    });

    // 검색 필터 모달 내 입력창에서 엔터키 누르면 "검색" 버튼 클릭 효과
    document.getElementById('filterInput').addEventListener('keyup', function(event) {
      if (event.key === 'Enter') {
        document.getElementById('applyFilterBtn').click();
      }
    });

    // "초기화" 버튼: 검색어 초기화 및 검색 모드 해제, 기본 무한 스크롤로 복원
    document.getElementById('clearFilterBtn').addEventListener('click', () => {
      document.getElementById('filterInput').value = '';
      isFiltering = false;
      clearPostList();
      loadMorePosts();
      bootstrap.Modal.getInstance(document.getElementById('filterModal')).hide();
    });

    function scrollToComment() {
      const params = new URLSearchParams(window.location.search);
      const commentId = params.get('commentId');
      if (commentId) {
        setTimeout(() => {
          const el = document.getElementById('commentNode-' + commentId);
          console.log('el', el);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            // 강조 효과
            el.classList.add('magic-shimmer');
            setTimeout(() => {              
              el.classList.remove('magic-shimmer'), 2000
            });
            
            const url = new URL(window.location);
            url.searchParams.delete('commentId');
            url.searchParams.delete('postId');
            window.history.replaceState({}, '', url);
          }
        }, 500);
      }
    }

    async function uploadImageToFirebase(blob) {
      const fileName = `posts/${Date.now()}_${blob.name}`;
      const imgRef   = ref(storage, fileName);
      const snap     = await uploadBytes(imgRef, blob);
      return await getDownloadURL(snap.ref);
    }

    async function fetchComment(postId) {
      const cmtQuery = query(
        collection(db, 'posts', postId, 'comments'),
        orderBy('createdAt', 'asc')
      );
      const snap = await getDocs(cmtQuery);
      const cmtData = snap.docs.map(doc => {
        const d = doc.data();
        d.commentId = doc.id;
        return d;
      });
      const commentListEl = document.getElementById(`commentList-${postId}`);
      if (commentListEl) renderComments(postId, cmtData, commentListEl);
    }

    async function fetchPost(postId) {
      const postRef = doc(db, 'posts', postId);
      const snap = await getDoc(postRef);
      if (snap.exists()) {
        updatePostUI(snap);
      }
    }

    async function init() {
      fetchActiveNotices();    
      const response = await fetch('quiz.json');
      quizQuestionsAll = await response.json();

      await loadMorePosts();
      await highlightPostFromQuery();
      scrollToComment();

      if (location.protocol === 'https:') {
        const messaging = getMessaging(app);
        onMessage(messaging, (payload) => {
          console.log('새 알림 도착✨', payload);
          const postId = payload.data?.postId;
          if (postId) {
            fetchComment(postId);
          }
        });
      }
    }

    async function awardPointsAndCheckRank(params) {
      // 이전 계급 저장
      const oldScore = currentScore;
      const oldRank = getRankByScore(currentScore).name;
      // 포인트 적립 호출
      const res = await awardPoints(params);
      // 새 점수 및 계급 계산
      const newScore = res.data.score;
      const newRank = getRankByScore(newScore).name;
      // 세션 점수 업데이트
      currentScore = newScore;
      // 계급이 변했다면 축하
      if (oldScore < newScore && oldRank !== newRank) {
        launchFireworks();
        showToast(`레벨업! 등급이 ${newRank}로 올랐습니다!`, '축하합니다', 8000);
      }
      return res.data.awarded;
    }

    init();
  </script>  
</body>
</html>
