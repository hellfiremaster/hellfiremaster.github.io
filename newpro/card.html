<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="뉴프로 카드 사진첩 & 카드 뽑기" />
  <meta name="theme-color" content="#2a4065">
  <meta property="og:title" content="뉴프로 카드 앨범" />
  <meta property="og:description" content="카드를 모아 기프트콘을 받아가요!" />
  <title>뉴프로 카드 앨범</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Jua&family=Comic+Neue:wght@400;700&family=Poor+Story&display=swap"
    rel="stylesheet">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./common/common.css" />
  <style>
    .gift-image {
      max-width: 100%;
      height: 95vh;
      display: block;
      margin: 0 auto;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    /* 모바일/태블릿에서만: 기프트 내역 모달을 꽉 채우고 여백 제거 */
    @media (max-width: 991.98px) { /* md 이하 전용 */
      #giftHistoryModal .modal-title { 
        display: none !important;      /* "기프트 내역" 숨김 */
      }
      #giftHistoryModal .modal-footer { 
        display: none !important;      /* 닫기(텍스트) 버튼 제거 */
      }
      #giftHistoryModal .modal-header {
        border: 0;                      /* 라인 제거 */
        padding: .5rem .5rem 0 .5rem;   /* X를 꼭대기에 딱 붙게 */
      }
      #giftHistoryModal .btn-close {
        padding: .75rem;
      }
      #giftHistoryModal .modal-content {
        border-radius: 0;
      }
      #giftHistoryModal .modal-body,
      #giftHistoryModal .accordion-body {
        padding: 0;            /* 이미지 주변 여백 쫙 제거 */
      }
      #giftHistoryModal .gift-image {
        display: block;
        width: 100vw;          /* 화면 가로 꽉 채우기 */
        max-width: 100%;
        height: auto !important; /* 전역 height:95vh 덮어쓰기 */
        margin: 0;
        border-radius: 0;
        box-shadow: none;
        object-fit: contain;   /* 바코드 잘리지 않게 */
      }

      .gift-loading{ min-height:70vh; }  /* 모바일은 더 크게 */
    }

    .badge-soft {
      background: rgba(42, 64, 101, .15);
      color: #2a4065;
      border: 1px solid rgba(42, 64, 101, .25);
    }

    [data-bs-theme="dark"] .badge-soft {
      background: rgba(255,255,255,.08);       /* 어둡지만 부드러운 배경 */
      color: #e5e7eb;                          /* 밝은 글씨 */
      border: 1px solid rgba(255,255,255,.2);  /* 연한 테두리 */
    }

    /* Reel (룰렛) */
    .reel-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 1rem;
      background: #0e1a31;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, .08);
    }

    .reel-strip {
      display: flex;
      gap: 12px;
      padding: 12px;
      will-change: transform;
    }

    .reel-card {
      width: 110px;
      height: 150px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, #1c2a4d, #122042);
      box-shadow: 0 2px 10px rgba(0, 0, 0, .5);
    }

    .reel-card img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
    }

    .reel-card::after {
      content: '?';
      position: absolute;
      inset: 0;
      color: #fff;
      font-family: 'Comic Neue', cursive;
      font-size: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .6);
    }

    .reel-indicator {
      position: absolute;
      left: 50%;
      top: -10px;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 14px solid #ffd166;
      filter: drop-shadow(0 0 6px rgba(255, 209, 102, .9));
      z-index: 2;
    }

    .draw-area .btn-draw {
      position: relative;
      overflow: hidden;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(255, 105, 180, .6);
      background: #ff69b4;
    }

    .btn-draw::before {
      content: "";
      position: absolute;
      top: -100%;
      left: -100%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, rgba(255, 255, 255, .6), rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0) 60%, rgba(255, 255, 255, .6));
      animation: shine 2.5s infinite;
    }

    @keyframes shine {
      0% {
        transform: translate(-100%, -100%)
      }

      50% {
        transform: translate(100%, 100%)
      }

      100% {
        transform: translate(-100%, -100%)
      }
    }

    /* Single Card Spinner */
    .single-wrap {
      height: 240px;
      position: relative;
    }

    .single-card {
      width: 180px;
      height: 260px;
      border-radius: 14px;
      background: linear-gradient(145deg, #1c2a4d, #122042);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .35);
      position: relative;
      transform-style: preserve-3d;
      transition: transform 600ms cubic-bezier(.2, .8, .2, 1);
      margin: 0 auto;
    }

    .single-card.shuffling {
      animation: jiggle 800ms ease-in-out infinite;
      box-shadow: 0 10px 28px rgba(255, 105, 180, .35), 0 0 0 3px rgba(255, 255, 255, .06) inset;
    }

    .single-card.flash::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0) 60%);
      opacity: 0;
      pointer-events: none;
      animation: flash 240ms ease-out;
      border-radius: 14px;
    }

    .single-card.revealed {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      border-radius: 14px;
      overflow: hidden;
    }

    .face.back {
      color: #fff;
      font-family: 'Comic Neue', cursive;
      font-size: 64px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, .6);
    }

    .face.front {
      transform: rotateY(180deg);
      background: #000;
    }

    .face.front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes jiggle {
      0% {
        transform: rotateY(-12deg) scale(1.0);
      }

      50% {
        transform: rotateY(0deg) scale(1.02);
      }

      100% {
        transform: rotateY(12deg) scale(1.0);
      }
    }

    @keyframes flash {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    /* 앨범 그리드 */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }

    .album-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #f0f3f8;
      border: 1px solid #e5eaf2;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
    }

    [data-bs-theme="dark"] .album-card {
      background: #1c1e22; /* 어두운 배경 */
      border: 1px solid #2a2d33;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .5);
    }

    .album-card img {
      width: 100%;
      height: 200px;
      object-fit: fill;
      display: block;
    }

    @media (max-width: 370px) {
      .album-card img {
        object-fit: cover;
      }
    }

    .album-card .label {
      position: absolute;
      left: 8px;
      top: 8px;
      background: rgba(0, 0, 0, .6);
      color: #fff;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: .9rem;
      z-index: 3;
    }

    .album-card.locked::before {
      content: "🔒";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: rgba(0, 0, 0, .35);
      color: #fff;
      z-index: 2;
    }

    .album-card.locked img {
      filter: blur(6px) grayscale(100%);
      transform: scale(1.05);
    }

    /* Giftcon */
    .giftcon {
      background: #fff;
      border-radius: 16px;
      border: 1px dashed #ccd4e0;
      overflow: hidden;
    }

    .giftcon-header {
      padding: 14px;
      background: linear-gradient(135deg, #ffe08a, #ffd166);
      font-weight: 700;
      text-align: center;
    }

    .giftcon-body {
      padding: 16px;
    }

    .barcode-wrap {
      background: #111;
      padding: 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- 카드 모달 전용 --- */
    #cardModal .modal-content {
      background: transparent !important;
      border: none;
      box-shadow: none;
    }

    #cardModal .modal-header,
    #cardModal .modal-footer {
      display: none;
    }

    #cardModal .modal-body {
      padding: 0;
    }

    /* 카드 이미지 */
    #cardModalImg {
      max-width: 90%;
      max-height: 95vh;
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.65);
      transform: translateY(0);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    #cardModalImg:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
    }

    /* 제목 (캡션 스타일) */
    #cardModalTitle.card-caption {
      font-family: 'Jua', cursive;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 
        0 2px 4px rgba(0,0,0,0.6),
        0 0 8px rgba(255,255,255,0.2);
      letter-spacing: 1px;
      animation: fadeInUp 0.5s ease;
    }

    /* 뒷배경 */
    #cardModal.modal.fade .modal-backdrop.show {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
    }

    /* 등장 애니메이션 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #cardModalTitle.card-caption {
      cursor: default;
      user-select: none;
    }

    /* 작은 점수 플로팅 칩 */
    .point-float {
      position: absolute;
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255, 105, 180, .95);
      color: #fff;
      font-weight: 800;
      font-family: 'Comic Neue', cursive;
      pointer-events: none;
      opacity: 0;
      animation: floatPop 800ms ease-out forwards;
      box-shadow: 0 6px 16px rgba(255, 105, 180, .35);
    }

    @keyframes floatPop {
      0%   { transform: translate(-50%, -20%) scale(.85); opacity: 0; }
      20%  { transform: translate(-50%, -30%) scale(1.05); opacity: 1; }
      100% { transform: translate(-50%, -80%) scale(1.0);  opacity: 0; }
    }

    /* 포인트 배지 살짝 뛰는 느낌 */
    #scoreDisplay.pulse {
      animation: scorePulse 600ms ease;
    }
    @keyframes scorePulse {
      0% { filter: drop-shadow(0 0 0 rgba(255,105,180,0)); }
      50% { filter: drop-shadow(0 0 8px rgba(255,105,180,.8)); }
      100% { filter: drop-shadow(0 0 0 rgba(255,105,180,0)); }
    }
    /* --- 이전 기프트 모달 빈 상태 --- */
    .gift-empty{
      background:#f8fafc;
      border:1px dashed #e2e8f0;
      border-radius:12px;
      padding:24px;
      text-align:center;
      color:#64748b;
    }

    /* === [READABILITY TWEAK] 확률 모달 글자 가독성 개선 === */
    #probModal .modal-content{
      background:#0f1b32 !important;
      color:#f8fafc;                    
      border:1px solid rgba(255,255,255,.12);
    }
    #probModal .modal-header,
    #probModal .modal-footer{
      border-color: rgba(255,255,255,.12);
    }
    #probModal .modal-title{
      color:#ffffff;
      text-shadow:0 1px 2px rgba(0,0,0,.4);
      letter-spacing:.2px;
    }

    /* 본문 타이포 크기 & 줄간 간격 업 */
    #probModal .modal-body{
      font-size:.98rem;
      line-height:1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 상단 “확률 합계” 문구도 더 밝게 */
    #probModal .modal-body .small.text-muted{
      color:#cbd5e1 !important;
    }

    /* 테이블 대비 강화 */
    #probModal .table{
      --bs-table-bg: transparent;
    }
    #probModal .table thead th{
      color:#e2e8f0;
      border-bottom:1px solid rgba(255,255,255,.16);
      font-weight:600;
    }
    #probModal .table tbody tr{
      border-top:1px solid rgba(255,255,255,.08); /* 줄갈이 구분선 */
    }
    #probModal .table tbody td{
      color:#f1f5f9;
      padding:.65rem .5rem;
    }

    /* 닫기/푸터 버튼도 더 또렷하게 */
    #probModal .modal-footer .btn{
      color:#fff;
      border-color:rgba(255,255,255,.28);
    }
    #probModal .modal-footer .btn:hover{
      border-color:rgba(255,255,255,.45);
    }

    /* info 아이콘이 너무 흐리면 주석 해제해서 진하게!
    #showProbBtn{ opacity:.9; }
    */

    /* 모바일에서 글자/패딩 조금 더 키우기 */
    @media (max-width: 575.98px){
      #probModal .modal-dialog{ margin:.5rem; }
      #probModal .modal-body{ font-size:1.05rem; }
      #probModal .table thead th,
      #probModal .table tbody td{ padding:.8rem .6rem; }
    }

    /* 황금 광채 펄스 */
    .album-card.glow{
      /* 기본 은은한 노란빛 */
      box-shadow:
        0 0 0 1px rgba(255, 243, 179, .45),
        0 0 12px rgba(255, 214, 102, .45),
        0 0 28px rgba(255, 191, 0, .28);
      animation: goldenPulse 2.2s ease-in-out infinite;
    }

    /* 펄스 애니메이션: 숨 쉬듯 약↔강 */
    @keyframes goldenPulse{
      0%, 100%{
        box-shadow:
          0 0 0 1px rgba(255, 243, 179, .45),
          0 0 12px rgba(255, 214, 102, .45),
          0 0 28px rgba(255, 191, 0, .28);
        filter: brightness(1) saturate(1);
      }
      50%{
        box-shadow:
          0 0 0 1px rgba(255, 250, 200, .75),
          0 0 20px rgba(255, 220, 120, .70),
          0 0 46px rgba(255, 200,   0, .55);
        filter: brightness(1.06) saturate(1.06);
      }
    }

    /* 움직임 민감한 친구들 배려 */
    @media (prefers-reduced-motion: reduce){
      .album-card.glow{ animation: none; }
    }

    /* 기프트 이미지 로딩용: 중앙 정렬 + 적당한 높이 */
    .gift-loading{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:50vh;        /* 데스크탑에서 중앙에 보이게 */
    }

    /* 큰 스피너 사이즈 */
    .spinner-big{
      width:3rem;
      height:3rem;
      border-width:.35rem;
    }

    .gift-image-wrap {
      position: relative;
    }

    .gift-delete-btn {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 4;
      background: rgba(255, 255, 255, .92);
    }

    @media (max-width: 991.98px) {
      .gift-delete-btn {
        right: 8px;
        bottom: 8px;
      }
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <div id="menu-container"></div>

  <section class="hero-section">
    <h1 class="hero-title">뉴프로 카드 앨범</h1>
    <p class="hero-subtitle">카드를 모아모아~ 전부 모으면 🎁 기프트콘이 짜잔!</p>
  </section>

  <div class="container pb-5">
    <!-- Draw Area -->
    <div class="glass-card p-3 p-md-4 mb-4 draw-area">
      <div class="d-flex justify-content-between flex-wrap align-items-center gap-2 mb-3">
        <div>          
          <span class="badge badge-soft me-2">수집 현황</span>
          <span class="fw-bold" id="progressText">0 / 0</span>
        </div>
      
        <!-- 포인트 + 정보 아이콘 (NEW) -->
        <div class="ms-auto d-flex align-items-center gap-2">
          <span class="badge badge-soft">
            내 포인트: <b id="scoreDisplay">—</b>
          </span>          
        </div>
      
        <div class="w-100 d-sm-none"></div>
      
        <div class="d-flex align-items-center gap-1 gap-sm-2 ms-auto ms-sm-0 flex-wrap">
          <button class="btn btn-light btn-sm order-3 order-sm-0 ms-auto ms-sm-0" id="showGiftHistoryBtn">🎁 기프트 확인</button>
          <button class="btn btn-draw order-3 order-sm-0" id="drawBtn">🎲 카드 뽑기</button>
        </div>
      </div>
      

      <div class="single-wrap d-flex justify-content-center align-items-center">
        <div class="single-card" id="card3d">
          <div class="face back" id="cardBack">?</div>
          <div class="face front"><img id="frontImg" src="" alt="card"></div>
        </div>
      </div>

      <button id="showProbBtn" class="btn btn-link btn-sm text-muted p-0 ms-auto" type="button" title="뽑기 확률 안내" aria-label="뽑기 확률 안내">
        <i class="bi bi-info-circle" style="font-size:1rem;"></i>
      </button>
      <!-- <small id="eventInfoText" class="text-muted d-block mt-3"></small> -->
    </div>

    <!-- Album -->
    <div class="glass-card p-3 p-md-4">
      <div class="d-flex align-items-center gap-2 mb-3">
        <h5 class="mb-0 adventure">내 사진첩</h5>
        <button id="submitCardsBtn" class="btn btn-light btn-sm ms-auto">
          📝 카드 제출
        </button>
      </div>
    
      <div class="album-grid" id="albumGrid"></div>
    </div>
  </div>

  <!-- Probability Modal -->
  <div class="modal fade" id="probModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">카드 뽑기 확률 안내</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
          <div id="probBody">
            <!-- JS에서 테이블을 렌더링합니다 -->
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-outline-light" data-bs-dismiss="modal">닫기</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Preview Modal -->
  <div class="modal fade card-preview-modal" id="cardModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body text-center">
          <!-- 카드 이미지 -->
          <img id="cardModalImg" src="" alt="card" />

          <!-- 카드 제목 (card.name 세팅됨) -->
          <h5 id="cardModalTitle" class="card-caption mt-3" data-bs-dismiss="modal" aria-label="Close"></h5>
        </div>
      </div>
    </div>
  </div>

  <!-- Gift History Modal -->
  <div class="modal fade" id="giftHistoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl modal-fullscreen-md-down">
      <div class="modal-content" style="border-radius:16px; overflow:hidden;">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title">기프트 내역</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="giftHistoryContainer">
            <div class="gift-empty" id="giftHistoryEmpty" style="display:none;">
              아직 받은 기프트가 없어요. 카드를 뽑아보자! ✨
            </div>
            <div class="accordion accordion-flush" id="giftHistoryAccordion"></div>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">닫기</button>
        </div>

  <!-- 공통 HTML -->
  <div id="common-html"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/moment@2.30.1/moment.min.js"></script>

  <!-- Firebase (ESM) -->
  <script type="module">
    import { showToast, showYesNoModal, requireLogin, showLoader } from './common/common.js';
    import { auth, db, functions, storage, analytics } from './common/firebase-init.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-auth.js';
    import { doc, getDoc, setDoc, getDocs, collection, query, where, orderBy, limit, Timestamp } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js';
    import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-functions.js';
    import { ref, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-storage.js';

    const drawCard = httpsCallable(functions, 'drawCard'); 
    const addWinner  = httpsCallable(functions, 'addWinner');

    /* ------------------ UI Helpers ------------------ */
    function launchFireworks(ms = 1600) {
      const end = Date.now() + ms; const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 2000 };
      const interval = setInterval(() => { const timeLeft = end - Date.now(); if (timeLeft <= 0) { clearInterval(interval); return; } const particleCount = 50 * (timeLeft / ms); confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } })); }, 250);
    }

    /* ------------------ Cards Data ------------------ */
    const CARDS = [
      { key: 'ddaknim', name: '딱님', file: './images/ddaknim.png' },
      { key: 'hellmaster', name: '헬마스터', file: './images/hellmaster.png' },
      { key: 'newpro_fairy', name: '뉴프로 요정', file: './images/newpro_fairy.png' },
      { key: 'svn', name: 'svn', file: './images/svn.png' },
      { key: 'pierrot', name: '피에로가르뎅', file: './images/pierrot.png' },
      { key: 'aska', name: '아스카', file: './images/aska.png' },
      { key: 'mungyu', name: '멍유', file: './images/mungyu.png' },
      { key: 'ryudog_master', name: '루도그둠둥', file: './images/ryudog_master.png' },
      { key: 'gayuna', name: '가연아', file: './images/gayuna.png' },
      { key: 'mungmyu', name: '멍뮤', file: './images/mungmyu.png' },
      { key: 'tdt', name: 'ㅆㅇㅆ', file: './images/tdt.png' }
    ];

    const progressText = document.getElementById('progressText');
    const albumGrid = document.getElementById('albumGrid');
    const reelStrip = document.getElementById('reelStrip');
    const reelWrap = document.getElementById('reelWrap');
    const drawBtn = document.getElementById('drawBtn');
    const showGiftHistoryBtn = document.getElementById('showGiftHistoryBtn');
    const submitCardsBtn = document.getElementById('submitCardsBtn');
    
    submitCardsBtn.addEventListener('click', submitCard);
    showGiftHistoryBtn.addEventListener('click', openGiftHistory);
    
    // (single card mode - no reel build)
    const submitModalEl = document.getElementById('submitModal');
    const submitModal   = new bootstrap.Modal(submitModalEl, { backdrop: 'static', keyboard: false });
    const confirmSubmitBtn = document.getElementById('confirmSubmitBtn');
    const cancelSubmitBtn  = document.getElementById('cancelSubmitBtn');
    
    async function submitCard() {             
      if(eventActive == null) {
        showToast('로딩중!');
        return;
      }
      if (!eventActive) {
        showToast('남은 선물이 없어서 지금은 진행할수 없어요… 금방 채워질 수도 있으니까 조금만 기다려줘~ (๑>◡<๑)🎁💖');
        return;
      }
      const user = auth.currentUser;
      if (!user) { 
        requireLogin(); 
        return; 
      }
      if(collected.size !== CARDS.length) {
        showToast('모든 카드를 모아 제출하세요!');
        return; 
      }
      // 상황에 따라 승자 등록 먼저
      const res = await maybeSubmitWinner();
      console.log('res', res)
      if (!res) return; // 사용자가 취소했거나 실패
      
      const giftconRef = ref(storage, res.data.giftconPath);
      try {
        const url = await getDownloadURL(giftconRef);
        const strDate = moment(res.data.winnerAt).format('YYYY-MM-DD');
        document.getElementById('giftName').textContent = res.data.giftName;
        document.getElementById('giftDate').textContent = strDate;
        const img = document.getElementById('giftImg');
        img.src = url;

        giftModal.show();
        launchFireworks(2000);

        await wait(2000);
        collected = await fetchMyCards(user.uid); 
        renderAlbum(collected);
      } catch(err) {
        console.error("이미지 접근 실패:", err);
        showToast('기프트콘에 접근할 수 없어요 😢');
      }
    }

    function confirmSubmitModal() {
      return new Promise((resolve) => {
        let decision = null;

        const onHidden = () => { off(); resolve(!!decision); };
        const onConfirm = () => { decision = true;  submitModal.hide(); };
        const onCancel  = () => { decision = false; submitModal.hide(); };

        function off() {
          confirmSubmitBtn.removeEventListener('click', onConfirm);
          cancelSubmitBtn.removeEventListener('click', onCancel);
          submitModalEl.removeEventListener('hidden.bs.modal', onHidden);
        }

        confirmSubmitBtn.addEventListener('click', onConfirm, { once: true });
        cancelSubmitBtn.addEventListener('click', onCancel,  { once: true });
        submitModalEl.addEventListener('hidden.bs.modal', onHidden, { once: true });

        submitModal.show();
      });
    }

    // Album grid
    function renderAlbum(collectedSet) {
      albumGrid.innerHTML = '';
      const isComplete = (collectedSet.size === CARDS.length);

      CARDS.forEach(card => {
        const isOwned = collectedSet.has(card.key);
        const div = document.createElement('div');

        const classes = ['album-card'];
        if (!isOwned) classes.push('locked');
        if (isComplete) classes.push('glow');   // ✨ 여기 한 줄!

        div.className = classes.join(' ');
        div.innerHTML = `<span class="label">${card.name}</span><img src="${card.file}" alt="${card.name}">`;

        if (isOwned) {
          div.addEventListener('click', () => openCardModal(card));
        }
        albumGrid.appendChild(div);
      });

      progressText.textContent = `${collectedSet.size} / ${CARDS.length}`;
    }

    // Modals
    const cardModal = new bootstrap.Modal(document.getElementById('cardModal'));
    function openCardModal(card) {
      document.getElementById('cardModalTitle').textContent = card.name;
      document.getElementById('cardModalImg').src = card.file;
      cardModal.show();
    }

    // ---------- Gift History(기프트 내역) ----------
    const giftHistoryModal = new bootstrap.Modal(document.getElementById('giftHistoryModal'));
    const giftHistoryAccordion = document.getElementById('giftHistoryAccordion');
    const giftHistoryEmpty = document.getElementById('giftHistoryEmpty');


    function normalizeDate(input) {
      if (!input) return null;
      if (typeof input?.toDate === 'function') return input.toDate(); // Firestore Timestamp
      if (typeof input === 'number') return new Date(input);          // epoch ms
      if (input instanceof Date) return input;
      return new Date(input);
    }
    function formatDate(dt) { return moment(dt).format('YYYY-MM-DD'); }

    async function fetchGiftHistory(uid) {
      try {
        const userPrivateDoc = await getDoc(doc(db, 'users_private', uid));
        const data = userPrivateDoc.exists() ? userPrivateDoc.data() : null;
        const arr = Array.isArray(data?.gifts) ? data.gifts : [];
        arr.sort((a, b) => {
          const ad = normalizeDate(a?.winnerAt) || 0;
          const bd = normalizeDate(b?.winnerAt) || 0;
          return bd - ad; // 최신순
        });
        return arr;
      } catch (e) {
        console.warn('fetchGiftHistory failed', e);
        return [];
      }
    }

    function isSameGiftItem(a, b) {
      return a.giftconPath === b.giftconPath;
    }

    async function deleteGiftHistoryItem(uid, targetGift) {
      const userPrivateRef = doc(db, 'users_private', uid);
      const userPrivateDoc = await getDoc(userPrivateRef);
      if (!userPrivateDoc.exists()) return false;

      const data = userPrivateDoc.data() || {};
      const gifts = Array.isArray(data.gifts) ? [...data.gifts] : [];
      if (!gifts.length) return false;

      let removeIdx = gifts.findIndex((g) => isSameGiftItem(g, targetGift));

      if (removeIdx < 0) return false;

      const giftPath = targetGift.giftconPath;
      try {
        await deleteObject(ref(storage, giftPath));
      } catch (e) {
        // 이미 삭제된 파일은 무시하고 계속 진행
        if (e?.code !== 'storage/object-not-found') {
          throw e;
        }
      }

      gifts.splice(removeIdx, 1);
      await setDoc(userPrivateRef, { gifts }, { merge: true });
      return true;
    }

    async function getGiftUrl(g) {
      if (g?.giftconPath) {
        const giftRef = ref(storage, g.giftconPath);
        return await getDownloadURL(giftRef);
      }
    }

    function buildGiftHistoryAccordion(items) {
      giftHistoryAccordion.innerHTML = '';
      if (!items.length) {
        giftHistoryEmpty.style.display = 'block';
        return;
      }
      giftHistoryEmpty.style.display = 'none';

      items.forEach((g, idx) => {
        const when     = normalizeDate(g?.winnerAt);
        const whenStr  = when ? formatDate(when) : '날짜 미상';
        const collapseId = `giftCollapse${idx}`;
        const headerId   = `giftHeader${idx}`;

        const item = document.createElement('div');
        item.className = 'accordion-item';
        item.innerHTML = `
          <h2 class="accordion-header" id="${headerId}">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                    data-bs-target="#${collapseId}" aria-expanded="false" aria-controls="${collapseId}">
              ${whenStr}
            </button>
          </h2>
          <div id="${collapseId}" class="accordion-collapse collapse" aria-labelledby="${headerId}"
              data-bs-parent="#giftHistoryAccordion">
            <div class="accordion-body">
              <div class="gift-image-wrap">
                <div class="gift-loading d-none" id="spinner-wrap-${idx}">
                  <div class="spinner-border spinner-big text-secondary" role="status" aria-label="로딩중"></div>
                </div>

                <img 
                  id="giftImg-${idx}"
                  class="gift-image d-none"
                  alt="gift ${whenStr}"
                  data-loaded="false"
                />

                <button type="button" class="btn btn-outline-light btn-sm gift-delete-btn" id="giftDeleteBtn-${idx}">🗑️</button>
              </div>
            </div>
          </div>`;
        giftHistoryAccordion.appendChild(item);

        // 펼칠 때 로딩 시작 → 끝나면 이미지 표시
        const collapseEl = item.querySelector(`#${collapseId}`);
        const imgEl      = item.querySelector(`#giftImg-${idx}`);
        const spinner    = item.querySelector(`#spinner-wrap-${idx}`);
        const deleteBtn  = item.querySelector(`#giftDeleteBtn-${idx}`);

        deleteBtn.addEventListener('click', async (e) => {
          e.stopPropagation();

          const ok = await showYesNoModal({
            title: '기프트 삭제',
            message: '이 기프트 내역을 삭제할까요?',
            yesText: '삭제',
            noText: '취소'
          });
          if (!ok) return;

          const user = auth.currentUser;
          if (!user) {
            requireLogin();
            return;
          }

          deleteBtn.disabled = true;
          try {
            const deleted = await deleteGiftHistoryItem(user.uid, g);
            if (!deleted) {
              showToast('삭제할 기프트를 찾지 못했어요.');
              return;
            }

            const nextItems = await fetchGiftHistory(user.uid);
            buildGiftHistoryAccordion(nextItems);
            if (nextItems.length) {
              const firstCollapseEl = document.getElementById('giftCollapse0');
              if (firstCollapseEl) {
                new bootstrap.Collapse(firstCollapseEl, { toggle: true });
              }
            }
            showToast('기프트 내역을 삭제했어요.');
          } catch (err) {
            console.error('gift delete failed', err);
            showToast('삭제하지 못했어요. 잠시 후 다시 시도해줘.');
          } finally {
            deleteBtn.disabled = false;
          }
        });

        collapseEl.addEventListener('show.bs.collapse', async () => {
          if (imgEl.dataset.loaded === 'true') return;

          spinner.classList.remove('d-none');        // ✅ 중앙 스피너 ON
          try {
            const url = await getGiftUrl(g);         // (이 함수는 이전 답변 그대로)
            imgEl.onload = () => {
              spinner.classList.add('d-none');       // ✅ 스피너 OFF
              imgEl.classList.remove('d-none');      // ✅ 이미지 표시
            };
            imgEl.onerror = () => {
              spinner.classList.add('d-none');
              showToast('이미지를 불러오지 못했어… 😢');
            };
            imgEl.src = url;
            imgEl.dataset.loaded = 'true';
          } catch(e){
            spinner.classList.add('d-none');
            showToast('이미지 접근 실패');
          }
        });
      });
    }

    async function openGiftHistory() {
      const user = auth.currentUser;
      if (!user) { requireLogin(); return; }
      try {
        const items = await fetchGiftHistory(user.uid);
        if (!items.length) {
          showToast('아직 받은 기프트콘이 없어요. 카드를 뽑아보자! ✨');
          return;
        }
        buildGiftHistoryAccordion(items);
        giftHistoryModal.show();


        // 1) 모달이 보이기 시작한 뒤 살짝 텀을 주고 첫 항목 펼치기
        setTimeout(() => {
          const firstCollapseEl = document.getElementById('giftCollapse0');
          if (firstCollapseEl) {
            new bootstrap.Collapse(firstCollapseEl, { toggle: true });
          }
        }, 150);

        // 2) 첫 항목 날짜가 '최근 3일 이내'면 불꽃놀이 발사! (미래 날짜는 제외)
        const when = normalizeDate(items[0]?.winnerAt);
        if (when) {
          const diffDays = moment().diff(moment(when), 'days'); // 오늘=0, 어제=1 …
          if (diffDays >= 0 && diffDays <= 1) {
            setTimeout(() => launchFireworks(1600), 200);
          }
        }
      } catch (e) {
        showToast(e?.message ?? '기프트 내역을 불러오지 못했어요.');
      }
    }

    // Giftcon
    const giftModal = new bootstrap.Modal(document.getElementById('giftModal'));
    function drawBarcode(canvas, code) {
      const ctx = canvas.getContext('2d'); const W = canvas.width, H = canvas.height;
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#000';
      // simple pseudo barcode: map digits to bar widths
      let x = 10; const top = 10; const bottom = H - 10;
      for (let i = 0; i < code.length; i++) {
        const d = code.charCodeAt(i) % 7 + 1; // 1..7
        ctx.fillRect(x, top, d + 1, bottom - top);
        x += d + 2; // gap
        if (x > W - 10) break;
      }
    }

    async function maybeSubmitWinner() {      
      await initEventInfo();

      if (eventActive && collected.size === CARDS.length) {
        const ok = await confirmSubmitModal();
        if (!ok) return null;

        try {
          showLoader(true);
          const res = await addWinner();
          await initEventInfo();
          return res;
        } catch (e) {
          showToast(e?.message ?? '승자 등록에 실패했어요 ㅠㅠ');
          return null;
        } finally {
          showLoader(null);
        }
      }
      return true;
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        collected = await fetchMyCards(user.uid); 
        renderAlbum(collected);
        fetchMyScore(user.uid);
      } else {
        collected = new Set();
        renderAlbum(collected);
        setScoreUI('—');
      }
    });

    /* ------------------ Draw Animation (single card shuffle + flip reveal) ------------------ */
    let collected = new Set();
    const card3d = document.getElementById('card3d');
    const backFace = document.getElementById('cardBack');
    const frontImg = document.getElementById('frontImg');
    let isShuffling = false;

    // const SOUND_ENABLED = true;     // 소리 끄려면 false로!
    const MIN_WAIT = 1200;          // 최소 섞는 시간(ms)
    const TICK_EVERY = 160;         // 딱- 소리 템포

    const wait = (ms) => new Promise(r => setTimeout(r, ms));

    let tickTimer = null, faceTimer = null; // 사운드 & 물음표 애니메이션
    const BACK_GLYPHS = ['?', '★', '☆', '❋', '✦', '✧', '❖', '♦'];

    // --- 공통 리셋 유틸 ---
    function resetShuffleUI() {
      // 1) 타이머 정리
      if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
      if (faceTimer) { clearInterval(faceTimer); faceTimer = null; }

      // 2) 애니메이션 클래스 정리 (revealed는 건드리지 않음)
      card3d.classList.remove('shuffling', 'flash');

      // 3) 애니메이션 잔상 끊기 (리플로우)
      card3d.style.animation = 'none';
      card3d.getBoundingClientRect(); // 강제 리플로우
      card3d.style.animation = '';

      // 4) 백면 텍스트 초기화 + 상태 복구
      backFace.textContent = BACK_GLYPHS[0];
      isShuffling = false;
      drawBtn.disabled = false;
    }

    async function drawOnce() {
      if(eventActive == null) {
        showToast('로딩중!');
        return;
      }
      if (!eventActive) {
        showToast('남은 선물이 없어서 지금은 진행할수 없어요… 금방 채워질 수도 있으니까 조금만 기다려줘~ (๑>◡<๑)🎁💖');
        return;
      }

      const user = auth.currentUser;
      if (!user) { requireLogin(); return; }
      if (isShuffling) return;

      isShuffling = true;
      drawBtn.disabled = true;

      // 시작 상태 세팅
      card3d.classList.remove('revealed', 'flash'); // 앞면 닫고
      card3d.classList.add('shuffling');            // 흔들흔들 시작
      backFace.textContent = BACK_GLYPHS[0];

      // if (SOUND_ENABLED) tickTimer = setInterval(playTick, TICK_EVERY);
      faceTimer = setInterval(() => {
        backFace.textContent = BACK_GLYPHS[Math.floor(Math.random() * BACK_GLYPHS.length)];
      }, 120);

      try {
        // 서버 결과 + 최소 대기 동시
        showPointFloat(`-${drawPoint}`);
        const [cardRes] = await Promise.all([drawCard(), wait(MIN_WAIT)]);
        const { cardKey, newScore } = cardRes.data;
        const card = CARDS.find(c => c.key === cardKey);

        setScoreUI(newScore);

        // 섞기 종료
        if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
        if (faceTimer) { clearInterval(faceTimer); faceTimer = null; }
        card3d.classList.remove('shuffling');

        // 앞면 세팅 + 반짝 → 뒤집
        frontImg.src = card.file;

        // flash 효과가 매번 확실히 재생되도록 리플로우 후 재적용
        card3d.classList.remove('flash');
        card3d.getBoundingClientRect();
        card3d.classList.add('flash');
        await wait(120);
        card3d.classList.remove('flash');
        card3d.classList.add('revealed');

        // 미리보기, 앨범 갱신, 보상 체크
        openCardModal(card);
        collected = await fetchMyCards(user.uid);
        renderAlbum(collected);

        // const remainTxt = (typeof newScore === 'number') ? ` 남은 점수 ${newScore}점` : '';
        // showToast(`카드 획득! ✨${remainTxt}`);
      } catch (e) {
        console.error(e);
        showToast(e?.message ?? String(e));
      } finally {
        // 성공/에러 모두 항상 정리 (revealed는 유지되므로 성공 시 앞면 그대로!)
        resetShuffleUI();
      }
    }

    drawBtn.addEventListener('click', drawOnce);

    async function fetchMyCards(uid) {
      try {
        const q = query(
          collection(db, 'users_private', uid, 'cards'),
          where('pulls', '>=', 1)
        );
        const snap = await getDocs(q);
        const set = new Set();
        snap.forEach(d => {
          const data = d.data();
          // 문서 id가 key일 수도, 필드로 key를 갖고 있을 수도 있으니 둘 다 케어!
          const k = (data && data.key) ? data.key : d.id;
          // pulls가 1 이상이면 앨범에서 컬러로 보여줄 대상이야
          if (typeof data?.pulls === 'number' && data.pulls >= 1) {
            set.add(k);
          }
        });
        return set;
      } catch {
        return new Set();
      }
    }

    // ---- 이벤트 안내 ----
    // const eventInfoText = document.getElementById('eventInfoText');
    let eventActive = null;

    function formatKST(ts) {
      return moment(ts.toDate()).format('YYYY.MM.DD');
    }

    async function findActiveEventClient() {
      const nowTs = Timestamp.now();
      const q = query(
        collection(db, 'card_events'),
        where('winnerUid', '==', null),
        limit(1)
      );
      const snap = await getDocs(q);
      return !snap.empty;
    }

    // 초기 표시
    async function initEventInfo() {
      eventActive = await findActiveEventClient();
    }

    /* ------------------ Points UI helpers (NEW) ------------------ */
    const scoreDisplay = document.getElementById('scoreDisplay');

    let currentScore = null;
    let drawPoint = null;

    function setScoreUI(score) {
      currentScore = score;
      if (scoreDisplay) {
        scoreDisplay.textContent = `${score}점`;
        scoreDisplay.classList.remove('pulse');
        // 리플로우로 애니메 재생 보장
        void scoreDisplay.offsetWidth;
        scoreDisplay.classList.add('pulse');
      }
    }

    // 카드 위로 작은 "-5" 같은 칩 띄우기
    function showPointFloat(deltaText = '-5') {
      const host = document.querySelector('.single-wrap') || document.body;
      const el = document.createElement('div');
      el.className = 'point-float';
      el.textContent = deltaText;
      host.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }

    /* 내 포인트 초깃값 가져오기 (필드명은 상황에 맞게 바꿔줘)
      users_private/{uid} 루트 문서에 score 필드가 있다고 가정 */
    async function fetchMyScore(uid) {
      try {
        const userDoc = await getDoc(doc(db, 'users', uid));
        const data = userDoc.exists() ? userDoc.data() : null;
        const score = data?.score ?? data?.points ?? null;
        if (score != null) setScoreUI(score);
      } catch (e) {
        console.warn('fetchMyScore failed', e);
      }
    }

    /* ===== 확률 모달 ===== */
    // 캐시
    let distribution = null;
    let probability = null;

    const ALL_KEYS = CARDS.map(c => c.key);
    const NAME_BY_KEY = Object.fromEntries(CARDS.map(c => [c.key, c.name]));

    // 엘리먼트
    const probModal = new bootstrap.Modal(document.getElementById('probModal'));
    const probBody  = document.getElementById('probBody');
    const showProbBtn = document.getElementById('showProbBtn');

    // 핸들러
    if (showProbBtn) {
      showProbBtn.addEventListener('click', openProbModal);
    }

    async function openProbModal(){
      try{
        const probs = getCompiledProbs(distribution);
        renderProbContent(probs);
        probModal.show();
      }catch(e){
        showToast(e?.message ?? '확률 정보를 불러오지 못했어…');
      }
    }

    async function initCardConfig(){
      const snap = await getDoc(doc(db, 'config', 'card'));   // config/card 문서
      const data = snap.data();
      distribution = data.distribution;
      drawPoint = data.drawPoint;
    }

    // 확률표 캐시/컴파일
    function getCompiledProbs(raw){
      if (probability) return probability;
      probability = compileProbabilities(raw, ALL_KEYS);
      return probability;
    }

    /* --- 확률 유틸 --- */
    function toProb(entry){
      if (entry == null) return null;
      if (typeof entry === 'object'){
        if (entry.p != null) return entry.p;
        if (entry.oneIn != null && entry.oneIn > 0) return 1 / entry.oneIn;
      }
      return null; // 숫자 단독은 weight로 취급(확률 아님)
    }

    function compileProbabilities(rawConfig, allKeys){
      // 누락키 보정: 없으면 weight=1
      const cfg = {};
      for (let k of allKeys){
        cfg[k] = (rawConfig && rawConfig[k] != null) ? rawConfig[k] : { weight: 1 };
      }

      // 1) 고정 확률 합산
      const fixed = {};
      const weights = {};
      let fixedSum = 0;

      for (let k of allKeys){
        const p = toProb(cfg[k]);
        if (p != null){
          fixed[k] = p;
          fixedSum += p;
        }else{
          const v = cfg[k];
          let w = (typeof v === 'number') ? v : (v && v.weight != null ? v.weight : 1);
          if (!(typeof w === 'number' && isFinite(w) && w >= 0)) w = 0;
          weights[k] = w;
        }
      }
      if (fixedSum > 1) throw new Error('총 확률 합이 1을 초과했어요!');

      // 2) 남는 확률을 weight 비율로 배분
      const leftover = 1 - fixedSum;
      let wsum = 0;
      for (let k in weights) if (Object.prototype.hasOwnProperty.call(weights, k)) wsum += weights[k];

      const probs = {};
      for (let k of allKeys){
        if (fixed[k] != null){
          probs[k] = fixed[k];
        }else{
          const ww = weights[k] || 0;
          probs[k] = (wsum > 0) ? leftover * (ww / wsum) : 0;
        }
      }

      // 3) 미세 오차 보정
      let total = 0;
      for (let k of allKeys) total += (probs[k] || 0);
      if (Math.abs(total - 1) > 1e-10){
        const last = allKeys[allKeys.length - 1];
        probs[last] = (probs[last] || 0) + (1 - total);
      }
      return probs;
    }

    function toPercentStr(p){
      // 소수 확률 → % 단위 문자열 (최대 소수 2자리, 0 트림)
      const v = Math.round(p * 10000) / 100; // 2자리 반올림
      return (v.toFixed(2).replace(/\.?0+$/,'') + '%');
    }

    function renderProbContent(probs){
      const rows = ALL_KEYS.map(k => ({
        key: k,
        name: NAME_BY_KEY[k] || k,
        p: probs[k] || 0
      })).sort((a,b)=> b.p - a.p);

      const sum = rows.reduce((acc,r)=> acc + r.p, 0);
      const sumStr = toPercentStr(sum);

      const tbody = rows.map((r, i) => `
        <tr>
          <td>${i+1}</td>
          <td>${r.name}</td>
          <td class="text-end fw-semibold">${toPercentStr(r.p)}</td>
        </tr>
      `).join('');

      probBody.innerHTML = `
        <div class="small text-muted mb-2">
          1회 뽑기: <b>${drawPoint}점</b>, 확률 합계: <b>${sumStr}</b>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-borderless align-middle mb-0">
            <thead class="border-bottom border-light-subtle">
              <tr>
                <th style="width:52px">#</th>
                <th>카드</th>
                <th class="text-end">확률</th>
              </tr>
            </thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
      `;
    }

    function init() {
      initEventInfo();
      initCardConfig();
    }

    init();

  </script>
</body>
